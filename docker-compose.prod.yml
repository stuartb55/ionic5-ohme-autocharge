# Production stack for the Mac Mini home server — pulls pre-built images from GHCR.
# Only the UI is published; the backend stays on the internal network.
services:
  autocharge-backend:
    image: ghcr.io/stuartb55/ionic5-ohme-autocharge:latest
    container_name: autocharge
    # The frontend's nginx proxies /api to http://backend:8000, so the backend
    # must be reachable under the hostname "backend" regardless of its service
    # or container name.
    networks:
      default:
        aliases:
          - backend
    env_file: .env
    # Persist charging history to the bundled Postgres. Override DATABASE_URL in
    # .env to point elsewhere, or leave it blank there to disable persistence.
    # The password comes from the same POSTGRES_PASSWORD the postgres service
    # uses, so setting it in .env can't silently break the backend's connection.
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://autocharge:${POSTGRES_PASSWORD:-autocharge}@postgres:5432/autocharge}
      # Local time for log timestamps and daily-stats date bucketing (the
      # container would otherwise run UTC, off by an hour during BST).
      TZ: ${TZ:-Europe/London}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # Persist runtime settings (e.g. the charge target) across restarts.
    volumes:
      - autocharge-data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:18-alpine
    container_name: autocharge-db
    environment:
      POSTGRES_USER: autocharge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autocharge}
      POSTGRES_DB: autocharge
    # Published on loopback only: the Mac Mini's Grafana runs on the same host,
    # and a default-credentialed Postgres must not be reachable from the LAN.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - autocharge-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autocharge"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  autocharge-frontend:
    image: ghcr.io/stuartb55/ionic5-ohme-autocharge-ui:latest
    container_name: autocharge-ui
    depends_on:
      - autocharge-backend
    ports:
      - "8084:8080"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  autocharge-data:
  autocharge-pgdata:
