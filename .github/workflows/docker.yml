name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint Python
        run: ruff check .

      - name: Run tests
        run: pytest tests/ -v

      - name: Audit Python dependencies
        run: pip-audit -r requirements-dev.txt

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit & integration tests
        run: npm run test

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

      - name: Production build
        run: npm run build

  migration-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
        env:
          POSTGRES_DB: autocharge_test
          POSTGRES_USER: autocharge
          POSTGRES_PASSWORD: autocharge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U autocharge -d autocharge_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CI_MIGRATION_TEST: "1"
      DATABASE_URL: postgresql://autocharge:autocharge@localhost:5432/autocharge_test
      HYUNDAI_USERNAME: ci
      HYUNDAI_PASSWORD: ci
      HYUNDAI_PIN: "0000"
      OHME_EMAIL: ci@example.com
      OHME_PASSWORD: ci
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install backend dependencies
        run: pip install -r requirements.txt
      - name: Upgrade legacy schema and verify exact-unit backfill
        run: python tests/integration/check_migrations.py
      - name: Exercise real persistence workflow and reconnect
        run: python tests/integration/check_postgres_workflow.py

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
  # Build both images and confirm the containers actually boot and serve their
  # health endpoints. Polling is disabled so this needs no Ohme/Hyundai
  # credentials and makes no external calls — it only proves the app runs.
  smoke:
    needs: [test, frontend-test, migration-test]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build backend image
        run: docker build -t autocharge-backend:ci .

      - name: Build frontend image
        run: docker build -t autocharge-frontend:ci ./frontend

      - name: Start backend container
        run: |
          docker run -d --name backend -p 8000:8000 \
            -e AUTOCHARGE_DISABLE_POLLING=1 \
            -e HYUNDAI_USERNAME=ci -e HYUNDAI_PASSWORD=ci -e HYUNDAI_PIN=0000 \
            -e OHME_EMAIL=ci@example.com -e OHME_PASSWORD=ci \
            autocharge-backend:ci

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/api/health; then echo " — backend OK"; exit 0; fi
            sleep 2
          done
          echo "backend never became healthy"; docker logs backend; exit 1

      - name: Start frontend container
        run: docker run -d --name frontend -p 8080:8080 autocharge-frontend:ci

      - name: Wait for frontend health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/healthz; then echo " — frontend OK"; exit 0; fi
            sleep 2
          done
          echo "frontend never became healthy"; docker logs frontend; exit 1

      - name: Container logs (on failure)
        if: failure()
        run: |
          echo "=== backend ==="; docker logs backend || true
          echo "=== frontend ==="; docker logs frontend || true

      - name: Tear down
        if: always()
        run: docker rm -f backend frontend || true

  build-backend:
    needs: smoke
    # Only publish from pushes to main, never from pull requests.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up QEMU (multi-platform emulation)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag with the commit SHA as well as latest, so the running version is
      # identifiable and a bad deploy can be rolled back to a known image.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/ionic5-ohme-autocharge
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push backend
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    needs: smoke
    # Only publish from pushes to main, never from pull requests.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up QEMU (multi-platform emulation)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag with the commit SHA as well as latest, so the running version is
      # identifiable and a bad deploy can be rolled back to a known image.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/ionic5-ohme-autocharge-ui
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push frontend
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
