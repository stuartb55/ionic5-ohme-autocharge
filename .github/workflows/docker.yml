name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit & integration tests
        run: npm run test

      - name: Production build
        run: npm run build

  # Build both images and confirm the containers actually boot and serve their
  # health endpoints. Polling is disabled so this needs no Ohme/Hyundai
  # credentials and makes no external calls — it only proves the app runs.
  smoke:
    needs: [test, frontend-test]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t autocharge-backend:ci .

      - name: Build frontend image
        run: docker build -t autocharge-frontend:ci ./frontend

      - name: Start backend container
        run: |
          docker run -d --name backend -p 8000:8000 \
            -e AUTOCHARGE_DISABLE_POLLING=1 \
            -e HYUNDAI_USERNAME=ci -e HYUNDAI_PASSWORD=ci -e HYUNDAI_PIN=0000 \
            -e OHME_EMAIL=ci@example.com -e OHME_PASSWORD=ci \
            autocharge-backend:ci

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/api/health; then echo " — backend OK"; exit 0; fi
            sleep 2
          done
          echo "backend never became healthy"; docker logs backend; exit 1

      - name: Start frontend container
        run: docker run -d --name frontend -p 8080:8080 autocharge-frontend:ci

      - name: Wait for frontend health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/healthz; then echo " — frontend OK"; exit 0; fi
            sleep 2
          done
          echo "frontend never became healthy"; docker logs frontend; exit 1

      - name: Container logs (on failure)
        if: failure()
        run: |
          echo "=== backend ==="; docker logs backend || true
          echo "=== frontend ==="; docker logs frontend || true

      - name: Tear down
        if: always()
        run: docker rm -f backend frontend || true

  build-backend:
    needs: smoke
    # Only publish from pushes to main, never from pull requests.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-platform emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.repository_owner }}/ionic5-ohme-autocharge:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    needs: smoke
    # Only publish from pushes to main, never from pull requests.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-platform emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.repository_owner }}/ionic5-ohme-autocharge-ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
