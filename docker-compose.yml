# Local development stack — builds both images from source.
# The frontend (nginx) proxies /api to the backend service over the internal
# network, so only the UI port is published to the host.
services:
  backend:
    build: .
    env_file: .env
    # Persist charging history to the bundled Postgres. Override DATABASE_URL in
    # .env to point elsewhere, or leave it blank there to disable persistence.
    # The password comes from the same POSTGRES_PASSWORD the postgres service
    # uses, so the two can never drift apart.
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://autocharge:${POSTGRES_PASSWORD:-autocharge}@postgres:5432/autocharge}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # Exposed on the host for convenience during development (docs at /docs).
    ports:
      - "8000:8000"
    # Persist runtime settings (e.g. the charge target) across restarts.
    volumes:
      - autocharge-data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: autocharge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autocharge}
      POSTGRES_DB: autocharge
    # Published on loopback only, so Grafana (or psql) on this host can query
    # the history directly without exposing the database to the LAN.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - autocharge-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autocharge"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:8080"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  autocharge-data:
  autocharge-pgdata:
